<div class="hf-main">

  <div class="hf-hero">
    <h1>Support-Mail Vorlage</h1>
    <p>Wähle die relevanten Bausteine aus und kopiere den fertigen Mailtext.</p>
  </div>

  <div class="columns">
    <div class="column is-half">

      <!-- 1️⃣ Kommunikation & E-Mail -->
      <div class="hf-section">
        <h3 class="hf-section-title">Kommunikation &amp; E-Mail</h3>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="SMTP Einstellungen für den E-Mailversand" data-html="<p><strong>SMTP Einstellungen für den E-Mailversand:</strong></p><p>Um Ihre SMTP Einstellungen vorzunehmen, folgen Sie den Schritten auf dem Screenshot:</p><img src='https://www.dropbox.com/scl/fi/e1sqnvm2zvxvm0z0lga2h/SMTP.png?rlkey=su6hx42nn36qebgnketw8enqn&st=2h7pkikz&raw=1' width='800'>">
          SMTP Einstellungen für den E-Mailversand
        </label>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="Layout der E-Mail anpassen" data-html="<p><strong>Layout der E-Mail anpassen:</strong></p><p>Passen Sie das Layout der E-Mail nach Ihren Vorgaben an.</p><img src='https://www.dropbox.com/scl/fi/zql69x74im9kh5ia114cy/E-Mail_Layout.png?rlkey=m9sxgkgsho2dogrznndu248wk&st=m7d371ax&raw=1' width='800'>">
          Layout der E-Mail anpassen
        </label>
      </div>

      <!-- 2️⃣ Booking Engine / Buchungslogik -->
      <div class="hf-section">
        <h3 class="hf-section-title">Booking Engine / Buchungslogik</h3>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="Allgemeine Einstellungen für die Booking Engine" data-html="<p><strong>Allgemeine Einstellungen für die Booking Engine:</strong></p><p>Passen Sie die Einstellungen nach Ihren Vorgaben an.</p><img src='https://www.dropbox.com/scl/fi/1iv0e4076ruub4up1ebb9/Booking-Engine_Allg.png?rlkey=di0bju0h79tca6ysfvawst5sh&st=sztw2dpv&raw=1' width='800'>">
          Allgemeine Einstellungen für die Booking Engine
        </label>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="Booking Engine Pro" data-html="<p><strong>Booking Engine Pro:</strong></p><p>Erweiterte Funktionen der Booking Engine nutzen.</p><img src='https://www.dropbox.com/scl/fi/63ppo89cn2xvicxmsvojs/BE_PRO.png?rlkey=w34lxc7yguzrc8f956sl2fo8i&st=ris2nl1k&raw=1' width='800'>">
          Booking Engine Pro
        </label>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="Bilder für die Booking Engine" data-html="<p><strong>Bilder für die Booking Engine:</strong></p><p>Konfigurieren Sie die Anzeige der Zimmer in der Booking Engine mit den passenden Bildern.</p><img src='https://www.dropbox.com/scl/fi/xjicbkjm0dcru4sbi9c6r/BE_Bilder2.png?rlkey=opziq7jucc3uhjukvwxg90i1z&st=387ywao8&raw=1' width='800'><br><img src='https://www.dropbox.com/scl/fi/u27el0rz19b370y0fc1bp/BE_Bilder1.png?rlkey=n1rj15u901sefh1q0oz8beslw&st=w3o9w32f&raw=1' width='800'>">
          Bilder für die Booking Engine
        </label>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="Buchungsbeschränkungen" data-html="<p><strong>Buchungsbeschränkungen:</strong></p><p>Definieren Sie Limits für Buchungen (z.B. Mindestaufenthalt).</p><img src='https://www.dropbox.com/scl/fi/frlc3rv5nv2xr9pfki85m/Restriktions.png?rlkey=4pfbebnvbzo4hvnyxsd5tfbak&st=qxiuual5&raw=1' width='800'>">
          Buchungsbeschränkungen
        </label>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="Saisons" data-html="<p><strong>Saisons:</strong></p><p>Legen Sie saisonale Preis- und Verfügbarkeitszeiträume fest.</p><img src='https://www.dropbox.com/scl/fi/rbqzou3luhcc6v1cnmhx7/Saisons.png?rlkey=vyjyx873kokrqgqkchjpv0wmo&st=sm446fpx&raw=1' width='800'>">
          Saisons
        </label>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="Dynamische Raten" data-html="<p><strong>Dynamische Raten:</strong></p><p>Aktivieren Sie variable Preise basierend auf Nachfrage.</p><img src='https://www.dropbox.com/scl/fi/axjoyfai7gfmige2mku6y/dynamische-rate.png?rlkey=q2p1242jpz98hzqixb8bni8cw&st=9haga7e3&raw=1' width='800'>">
          Dynamische Raten
        </label>
      </div>

      <!-- 3️⃣ Abrechnung & Rechtliches -->
      <div class="hf-section">
        <h3 class="hf-section-title">Abrechnung &amp; Rechtliches</h3>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="Einstellungen für die Rechnung" data-html="<p><strong>Rechnungseinstellungen allgemein:</strong></p><p>Passen Sie die Rechnungseinstellungen nach Ihren Vorgaben an.</p><img src='https://www.dropbox.com/scl/fi/5in6t3wdlo1yex2eltach/Rechnungseinstellungen.png?rlkey=qom4oxw7aaiusy2nn0497ozgf&st=9g3o7t6k&raw=1' width='800'>">
          Einstellungen für die Rechnung
        </label>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="Stornobedingungen" data-html="<p><strong>Stornobedingungen:</strong></p><p>Passen Sie die Stornierungsbedingungen nach Ihren Vorgaben an.</p><img src='https://www.dropbox.com/scl/fi/vhbjjwpgqfkfnsy269x0o/Stornobedingungen.png?rlkey=h7grv1xm17rijwpzzo0d8ifi8&st=ipa7fsc3&raw=1' width='800'>">
          Stornobedingungen
        </label>
        <label class="hf-baustein">
          <input type="checkbox" checked class="baustein" data-title="MwSt.-Sätze" data-html="<p><strong>MwSt.-Sätze:</strong></p><p>Konfigurieren Sie die Mehrwertsteuersätze für Rechnungen.</p><img src='https://www.dropbox.com/scl/fi/de8tosrzsc9oegrk481cm/MwSt..png?rlkey=e6s55gdh50r751klqwghyt8yt&st=o8eijzsh&raw=1' width='800'>">
          MwSt.-Sätze
        </label>
      </div>

    </div>

    <div class="column is-half">
      <div class="hf-output-sticky">
        <h3 class="hf-section-title">Finaler Mailtext</h3>
        <div id="finalText" class="hf-output">
          <button id="copyBtn" class="button is-primary is-small">Kopieren</button>
        </div>
      </div>
    </div>
  </div>
